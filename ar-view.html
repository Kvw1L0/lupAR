<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Escáner - Lupa Mágica</title>
    
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
    
    <link rel="stylesheet" href="style.css">
    <style>
        body { margin: 0; overflow: hidden; background-color: transparent !important; }
        .a-enter-vr { display: none !important; }
        video { z-index: -2 !important; position: absolute !important; width: 100vw !important; height: 100vh !important; object-fit: cover !important; }
        .a-canvas { z-index: -1 !important; pointer-events: none; }
    </style>
</head>
<body>

    <div id="loading-overlay">
        <div class="spinner"></div>
        <p id="loading-text">Calibrando Lente...</p>
    </div>

    <div id="scanner-ui">
        <button class="back-btn" onclick="location.href='index.html'">✕ Cerrar</button>
        <div class="reticle">
            <div class="scan-line"></div>
        </div>
        <p class="scan-instruction">Busca una imagen...</p>
        
        <div id="info-card" class="hidden">
            <h2 id="obj-title">¡Imagen Revelada!</h2>
            <p id="obj-desc">El contenido oculto ha cobrado vida.</p>
        </div>
    </div>

    <a-scene mindar-image="imageTargetSrc: ./targets.mind; maxTrack: 1" color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
        
        <a-assets>
            <video id="video-magico" src="video.mp4" preload="auto" loop muted playsinline webkit-playsinline></video>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity id="anchor0" mindar-image-target="targetIndex: 0">
            <a-video src="#video-magico" width="1" height="1" position="0 0 0.05"></a-video>
        </a-entity>

    </a-scene>

    <script src="script.js"></script>
</body>
</html>
