<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Escáner - Lupa Mágica</title>
    
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script>
        if (typeof THREE !== 'undefined') {
            if (!THREE.Math) { THREE.Math = THREE.MathUtils; }
            if (THREE.BufferGeometry && !THREE.BufferGeometry.prototype.addAttribute) {
                THREE.BufferGeometry.prototype.addAttribute = function (name, attribute) {
                    return this.setAttribute(name, attribute);
                };
            }
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
    
    <link rel="stylesheet" href="style.css">
    <style>
        body { margin: 0; overflow: hidden; background-color: transparent !important; }
        .a-enter-vr { display: none !important; }
        video { z-index: -2 !important; position: absolute !important; width: 100vw !important; height: 100vh !important; object-fit: cover !important; }
        .a-canvas { z-index: -1 !important; pointer-events: none; }
    </style>
</head>
<body>

    <div id="loading-overlay">
        <div class="spinner"></div>
        <p id="loading-text">Calibrando Lente...</p>
    </div>

    <div id="scanner-ui">
        <button class="back-btn" onclick="location.href='index.html'">✕ Cerrar</button>
        <div class="reticle">
            <div class="scan-line"></div>
        </div>
        <p class="scan-instruction">Busca un objetivo...</p>
        
        <div id="info-card" class="hidden">
            <h2 id="obj-title">¡Objeto Encontrado!</h2>
            <p id="obj-desc">Has revelado un secreto oculto.</p>
        </div>
    </div>

    <a-scene mindar-image="imageTargetSrc: ./targets.mind; maxTrack: 1" color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
        
        <a-assets>
            <a-asset-item id="modelo1" src="objeto1.glb"></a-asset-item>
            <a-asset-item id="modelo2" src="objeto2.glb"></a-asset-item>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
        <a-light type="ambient" intensity="1"></a-light>
        <a-light type="directional" position="0 10 0" intensity="0.5"></a-light>

        <a-entity id="anchor0" mindar-image-target="targetIndex: 0">
            <a-gltf-model src="#modelo1" position="0 0 0.1" scale="0 0 0" 
                animation="property: scale; to: 0.1 0.1 0.1; dur: 800; easing: easeOutElastic; startEvents: model-appear"
                animation__rot="property: rotation; to: 0 360 0; loop: true; dur: 5000">
            </a-gltf-model>
        </a-entity>

        <a-entity id="anchor1" mindar-image-target="targetIndex: 1">
            <a-gltf-model src="#modelo2" position="0 0 0.1" scale="0 0 0" 
                animation="property: scale; to: 0.1 0.1 0.1; dur: 800; easing: easeOutElastic; startEvents: model-appear"
                animation__rot="property: rotation; to: 0 360 0; loop: true; dur: 5000">
            </a-gltf-model>
        </a-entity>

    </a-scene>

    <script src="script.js"></script>
</body>
</html>
